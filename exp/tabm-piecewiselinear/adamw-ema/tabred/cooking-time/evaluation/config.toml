function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false
share_training_batches = false

[base_config.data]
path = "data/cooking-time"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "tabm"

[base_config.model.backbone]
k = 16
arch_type = "tabm"
n_blocks = 3
d_block = 896
dropout = 0.03004423976689196

[base_config.model.num_embeddings]
type = "PiecewiseLinearEmbeddings"
d_embedding = 16
activation = false
version = "B"

[base_config.model_num_embeddings_bins]
n_bins = 31

[base_config.optimizer]
type = "AdamW"
ema_decay = 0.900657482860538
lr = 0.0019469971736326363
weight_decay = 0.004529353706645227
