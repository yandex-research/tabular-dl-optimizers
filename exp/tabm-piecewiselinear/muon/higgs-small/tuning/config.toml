seed = 0
function = "bin.ffn.main"
n_trials = 100

[sampler]
n_startup_trials = 20

[space]
seed = 0
batch_size = 512
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
share_training_batches = false
save_checkpoint = false

[space.data]
path = "data/higgs-small"
num_policy = "noisy-quantile"
cache = true

[space.model]
type = "tabm"

[space.model.backbone]
arch_type = "tabm"
k = 16
n_blocks = [
    "_tune_",
    "int",
    1,
    4,
]
d_block = [
    "_tune_",
    "int",
    64,
    1024,
    16,
]
dropout = [
    "_tune_",
    "?uniform",
    0.0,
    0.0,
    0.5,
]

[space.model.num_embeddings]
type = "PiecewiseLinearEmbeddings"
d_embedding = [
    "_tune_",
    "int",
    8,
    32,
    4,
]
activation = false
version = "B"

[space.model_num_embeddings_bins]
n_bins = [
    "_tune_",
    "int",
    2,
    128,
]

[space.optimizer]
type = "Muon"
lr = [
    "_tune_",
    "loguniform",
    0.0001,
    0.005,
]
weight_decay = [
    "_tune_",
    "loguniform",
    0.001,
    1.0,
]
betas = [
    0.9,
    0.999,
]
eps = 1e-08

[space.optimizer.muon]
lr = [
    "_tune_",
    "loguniform",
    0.001,
    0.1,
]
