function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false

[base_config.data]
path = "data/house"
num_policy = "noisy-quantile"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 3
d_block = 1024
dropout = 0.09372021070123501

[base_config.optimizer]
type = "AdamWScheduleFree"
lr = 0.01603146030464016
weight_decay = 0.2301190265096413
