function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false

[base_config.data]
path = "data/california"
num_policy = "noisy-quantile"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 3
d_block = 848
dropout = 0.4300907117049558

[base_config.optimizer]
type = "AdamWScheduleFree"
lr = 0.00010275790623774924
weight_decay = 1.7163117808697643
