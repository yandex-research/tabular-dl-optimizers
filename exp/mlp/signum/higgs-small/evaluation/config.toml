function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 512
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/higgs-small"
num_policy = "noisy-quantile"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 2
d_block = 464
dropout = 0.48383229647102477

[base_config.optimizer]
type = "Signum"
lr = 0.0003500460033439252
weight_decay = 0.8953441083545579
