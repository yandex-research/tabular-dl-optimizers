function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/california"
num_policy = "noisy-quantile"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 2
d_block = 736
dropout = 0.36903845982047273

[base_config.optimizer]
type = "AdEMAMix"
lr = 8.590972800091055e-05
alpha = 7.071205959434675
weight_decay = 2.1415759579275613
