function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/cooking-time"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 1
d_block = 208
dropout = 0.0

[base_config.optimizer]
type = "AdEMAMix"
lr = 0.00012918237064121364
alpha = 1.7088358785335307
weight_decay = 3.9638646542683653
