function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/sberbank-housing"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 6
d_block = 640
dropout = 0.31490651314234674

[base_config.optimizer]
type = "AdEMAMix"
lr = 0.0003543645814215754
alpha = 5.73609498113666
weight_decay = 0.11465601761302818
