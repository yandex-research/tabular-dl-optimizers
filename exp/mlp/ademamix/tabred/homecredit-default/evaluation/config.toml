function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/homecredit-default"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 1
d_block = 256
dropout = 0.3272923478214478

[base_config.optimizer]
type = "AdEMAMix"
lr = 0.0003055961928267947
alpha = 2.238961489295259
weight_decay = 3.219864013970345
