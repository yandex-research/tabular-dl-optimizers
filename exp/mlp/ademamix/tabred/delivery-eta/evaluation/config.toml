function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/delivery-eta"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 1
d_block = 304
dropout = 0.0

[base_config.optimizer]
type = "AdEMAMix"
lr = 0.00013000533412039662
alpha = 4.472756552470896
weight_decay = 4.5753410267679016
