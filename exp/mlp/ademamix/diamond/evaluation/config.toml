function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 512
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/diamond"
num_policy = "noisy-quantile"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 5
d_block = 992
dropout = 0.4816168915478911

[base_config.optimizer]
type = "AdEMAMix"
lr = 6.625693726613199e-05
alpha = 2.141363492292057
weight_decay = 4.1567230958660115
