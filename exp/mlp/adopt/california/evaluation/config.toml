function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/california"
num_policy = "noisy-quantile"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 4
d_block = 496
dropout = 0.37600120117846075

[base_config.optimizer]
type = "ADOPT"
decouple = true
lr = 0.0002721864472470772
weight_decay = 0.8226048301696124
