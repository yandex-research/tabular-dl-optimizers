function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 512
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/diamond"
num_policy = "noisy-quantile"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 5
d_block = 816
dropout = 0.3682663818849471

[base_config.optimizer]
type = "ADOPT"
decouple = true
lr = 6.633495814232632e-05
weight_decay = 2.5638909790538627
