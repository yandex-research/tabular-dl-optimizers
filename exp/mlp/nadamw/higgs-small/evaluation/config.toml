function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 512
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/higgs-small"
num_policy = "noisy-quantile"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 2
d_block = 256
dropout = 0.4048818541870035

[base_config.optimizer]
type = "NAdam"
lr = 0.0007540995023757696
decoupled_weight_decay = true
weight_decay = 0.07417330391659124
