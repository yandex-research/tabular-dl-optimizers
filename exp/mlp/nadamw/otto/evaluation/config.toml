function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 512
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/otto"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 4
d_block = 576
dropout = 0.4206018920847301

[base_config.optimizer]
type = "NAdam"
lr = 0.0007628220728585263
decoupled_weight_decay = true
weight_decay = 0.5077760137789312
