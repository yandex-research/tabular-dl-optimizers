function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/maps-routing"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 1
d_block = 896
dropout = 0.40971466767275805

[base_config.optimizer]
type = "NAdam"
lr = 5.553939505708055e-05
decoupled_weight_decay = true
weight_decay = 2.96618896992444
