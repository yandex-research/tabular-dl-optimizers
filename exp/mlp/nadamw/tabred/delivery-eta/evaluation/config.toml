function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/delivery-eta"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 2
d_block = 368
dropout = 0.1562388634327498

[base_config.optimizer]
type = "NAdam"
lr = 9.432311805773938e-05
decoupled_weight_decay = true
weight_decay = 4.7075862496925724
