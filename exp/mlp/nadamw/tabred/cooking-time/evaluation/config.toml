function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/cooking-time"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 1
d_block = 784
dropout = 0.10371658816176543

[base_config.optimizer]
type = "NAdam"
lr = 0.00020107128329189527
decoupled_weight_decay = true
weight_decay = 1.380013347757718
