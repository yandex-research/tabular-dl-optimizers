function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/churn"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 2
d_block = 960
dropout = 0.17633439833084377

[base_config.optimizer]
type = "NAdam"
lr = 0.0002011827290365731
decoupled_weight_decay = true
weight_decay = 3.9585752912833905
