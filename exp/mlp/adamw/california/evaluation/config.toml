function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/california"
num_policy = "noisy-quantile"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 2
d_block = 784
dropout = 0.3690073279296028

[base_config.optimizer]
type = "AdamW"
lr = 0.0002722214565241805
weight_decay = 0.4555843429087667
