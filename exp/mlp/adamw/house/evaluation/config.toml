function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/house"
num_policy = "noisy-quantile"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 2
d_block = 960
dropout = 0.4960017193261079

[base_config.optimizer]
type = "AdamW"
lr = 0.0002653922052996858
weight_decay = 0.31961808914004997
