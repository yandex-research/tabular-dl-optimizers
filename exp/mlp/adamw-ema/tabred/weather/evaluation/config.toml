function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false

[base_config.data]
path = "data/weather"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 5
d_block = 944
dropout = 0.0

[base_config.optimizer]
type = "AdamW"
ema_decay = 0.9882972143800218
lr = 0.00022337537046636927
weight_decay = 3.8147016335984114
