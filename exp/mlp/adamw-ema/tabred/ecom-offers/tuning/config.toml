seed = 0
function = "bin.ffn.main"
n_trials = 100

[sampler]
n_startup_trials = 20

[space]
seed = 0
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false

[space.data]
path = "data/ecom-offers"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cache = true

[space.model]
type = "mlp"

[space.model.backbone]
n_blocks = [
    "_tune_",
    "int",
    1,
    6,
]
d_block = [
    "_tune_",
    "int",
    64,
    1024,
    16,
]
dropout = [
    "_tune_",
    "?uniform",
    0.0,
    0.0,
    0.5,
]

[space.optimizer]
type = "AdamW"
ema_decay = [
    "_tune_",
    "loguniform",
    0.9,
    0.999,
]
lr = [
    "_tune_",
    "loguniform",
    3e-05,
    0.001,
]
weight_decay = [
    "_tune_",
    "loguniform",
    0.005,
    5.0,
]
