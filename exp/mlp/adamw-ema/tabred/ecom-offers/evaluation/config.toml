function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false

[base_config.data]
path = "data/ecom-offers"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 1
d_block = 624
dropout = 0.0

[base_config.optimizer]
type = "AdamW"
ema_decay = 0.900432048171574
lr = 4.3585131669824726e-05
weight_decay = 0.011071792595094946
