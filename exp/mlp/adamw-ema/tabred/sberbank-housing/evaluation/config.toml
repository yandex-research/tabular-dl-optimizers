function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false

[base_config.data]
path = "data/sberbank-housing"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 3
d_block = 688
dropout = 0.37618390840568494

[base_config.optimizer]
type = "AdamW"
ema_decay = 0.9078541993933344
lr = 0.0005738873519789759
weight_decay = 0.02340721379436365
