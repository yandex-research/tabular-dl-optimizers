function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 512
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/higgs-small"
num_policy = "noisy-quantile"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 4
d_block = 864
dropout = 0.0

[base_config.optimizer]
type = "SGD"
momentum = 0.9
dampening = 0.9
lr = 0.03612353690025332
weight_decay = 0.006228287001236105
