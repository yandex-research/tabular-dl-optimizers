function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/cooking-time"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 3
d_block = 480
dropout = 0.0

[base_config.optimizer]
type = "SGD"
momentum = 0.9
dampening = 0.9
lr = 0.012597385998439807
weight_decay = 0.007376900237972326
