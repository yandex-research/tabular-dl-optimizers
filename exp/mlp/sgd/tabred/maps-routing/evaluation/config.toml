function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/maps-routing"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 1
d_block = 960
dropout = 0.29253418584593105

[base_config.optimizer]
type = "SGD"
momentum = 0.9
dampening = 0.9
lr = 0.014367091297390392
weight_decay = 0.009980646257026616
