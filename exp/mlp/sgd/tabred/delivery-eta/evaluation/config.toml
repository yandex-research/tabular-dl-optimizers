function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/delivery-eta"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 2
d_block = 336
dropout = 0.1677534027888378

[base_config.optimizer]
type = "SGD"
momentum = 0.9
dampening = 0.9
lr = 0.050372554782587446
weight_decay = 0.005168145951951433
