seed = 0
function = "bin.ffn.main"
n_trials = 100
n_workers = 2

[sampler]
n_startup_trials = 20

[space]
seed = 0
batch_size = 512
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[space.data]
path = "data/otto"
cache = true

[space.model]
type = "mlp"

[space.model.backbone]
n_blocks = [
    "_tune_",
    "int",
    1,
    6,
]
d_block = [
    "_tune_",
    "int",
    64,
    1024,
    16,
]
dropout = [
    "_tune_",
    "?uniform",
    0.0,
    0.0,
    0.5,
]

[space.optimizer]
type = "SGD"
momentum = 0.9
dampening = 0.9
lr = [
    "_tune_",
    "loguniform",
    0.001,
    0.1,
]
weight_decay = [
    "_tune_",
    "loguniform",
    0.005,
    5.0,
]
