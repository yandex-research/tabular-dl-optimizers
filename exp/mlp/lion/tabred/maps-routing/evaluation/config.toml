function = "bin.ffn.main"
n_seeds = 10
n_workers = 2

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/maps-routing"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 1
d_block = 1008
dropout = 0.4665641283141791

[base_config.optimizer]
type = "Lion"
lr = 4.6747939630118035e-05
weight_decay = 0.05537880572944991
