function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0

[base_config.data]
path = "data/homecredit-default"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 6
d_block = 528
dropout = 0.0

[base_config.optimizer]
lr = 0.00011416476723126821
weight_decay = 0.7065819547209782
betas = [
    0.9,
    0.999,
]
eps = 1e-08
type = "Muon"

[base_config.optimizer.muon]
lr = 0.00013076710914330423
