function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false

[base_config.data]
path = "data/weather"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 3
d_block = 768
dropout = 0.0

[base_config.optimizer]
type = "Muon"
ema_decay = 0.991036573814362
betas = [
    0.9,
    0.999,
]
eps = 1e-08
lr = 0.00024114024349219698
weight_decay = 0.3895073600158505

[base_config.optimizer.muon]
lr = 0.004688773361785255
