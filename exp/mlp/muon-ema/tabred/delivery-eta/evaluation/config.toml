[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 3
d_block = 880
dropout = 0.0

[base_config.optimizer]
type = "Muon"
ema_decay = 0.91644905798924
betas = [
    0.9,
    0.999,
]
eps = 1e-08
lr = 8.980277165150604e-05
weight_decay = 1.1216927376701804

[base_config.optimizer.muon]
lr = 0.0008052294094500693
