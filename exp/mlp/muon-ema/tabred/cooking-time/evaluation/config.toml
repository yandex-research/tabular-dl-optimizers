function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false

[base_config.data]
path = "data/cooking-time"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 2
d_block = 960
dropout = 0.10427631232531331

[base_config.optimizer]
type = "Muon"
ema_decay = 0.9741785686926796
betas = [
    0.9,
    0.999,
]
eps = 1e-08
lr = 3.083789800643108e-05
weight_decay = 0.9402684329376837

[base_config.optimizer.muon]
lr = 0.00012874260353978824
