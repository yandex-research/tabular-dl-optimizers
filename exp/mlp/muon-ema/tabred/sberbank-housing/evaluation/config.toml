function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false

[base_config.data]
path = "data/sberbank-housing"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "mlp"

[base_config.model.backbone]
n_blocks = 6
d_block = 784
dropout = 0.0

[base_config.optimizer]
type = "Muon"
ema_decay = 0.9574613558313279
betas = [
    0.9,
    0.999,
]
eps = 1e-08
lr = 0.00011088270966601462
weight_decay = 0.44721277096230544

[base_config.optimizer.muon]
lr = 0.023932150636328618
