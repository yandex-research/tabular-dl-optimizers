seed = 0
function = "bin.ffn.main"
n_trials = 100

[sampler]
n_startup_trials = 20

[space]
seed = 0
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false
share_training_batches = false

[space.data]
path = "data/california"
num_policy = "noisy-quantile"
cache = true

[space.model]
type = "tabm"

[space.model.backbone]
k = 16
arch_type = "tabm-packed"
n_blocks = [
    "_tune_",
    "int",
    1,
    5,
]
d_block = [
    "_tune_",
    "int",
    64,
    1024,
    16,
]
dropout = [
    "_tune_",
    "?uniform",
    0.0,
    0.0,
    0.5,
]

[space.optimizer]
type = "AdamW"
ema_decay = [
    "_tune_",
    "loguniform",
    0.9,
    0.999,
]
lr = [
    "_tune_",
    "loguniform",
    0.0001,
    0.005,
]
weight_decay = [
    "_tune_",
    "loguniform",
    0.001,
    1.0,
]
