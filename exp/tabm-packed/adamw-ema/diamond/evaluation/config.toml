function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 512
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false
share_training_batches = false

[base_config.data]
path = "data/diamond"
num_policy = "noisy-quantile"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "tabm"

[base_config.model.backbone]
k = 16
arch_type = "tabm-packed"
n_blocks = 4
d_block = 512
dropout = 0.0

[base_config.optimizer]
type = "AdamW"
ema_decay = 0.9424758898798479
lr = 0.004602276441288645
weight_decay = 0.1349989105759317
