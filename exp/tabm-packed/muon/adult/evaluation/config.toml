[base_config.model]
type = "tabm"

[base_config.model.backbone]
arch_type = "tabm-packed"
k = 16
n_blocks = 2
d_block = 656
dropout = 0.3650630462325162

[base_config.optimizer]
type = "Muon"
lr = 0.004403096382995858
weight_decay = 0.13270077134605565
betas = [
    0.9,
    0.999,
]
eps = 1e-08

[base_config.optimizer.muon]
lr = 0.0010044891374663264
