d_block = 464
dropout = 0.0

[base_config.optimizer]
type = "Muon"
lr = 0.00032536180415149445
weight_decay = 0.47806903707677956
betas = [
    0.9,
    0.999,
]
eps = 1e-08

[base_config.optimizer.muon]
lr = 0.0038032529817004887
