function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 1024
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false
share_training_batches = false

[base_config.data]
path = "data/maps-routing"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "tabm"

[base_config.model.backbone]
k = 16
arch_type = "tabm"
n_blocks = 5
d_block = 64
dropout = 0.0

[base_config.optimizer]
type = "AdamW"
ema_decay = 0.9519068239946303
lr = 0.001751683952112708
weight_decay = 0.05852984721287928
