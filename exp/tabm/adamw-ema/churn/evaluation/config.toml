function = "bin.ffn.main"
n_seeds = 10

[base_config]
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
save_checkpoint = false
share_training_batches = false

[base_config.data]
path = "data/churn"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[base_config.model]
type = "tabm"

[base_config.model.backbone]
k = 16
arch_type = "tabm"
n_blocks = 5
d_block = 672
dropout = 0.0382901499494214

[base_config.optimizer]
type = "AdamW"
ema_decay = 0.9852885889436028
lr = 0.0002693763325508488
weight_decay = 0.9146109489419965
