seed = 0
function = "bin.ffn.main"
n_trials = 50

[sampler]
n_startup_trials = 20

[space]
seed = 0
batch_size = 256
n_epochs = -1
patience = 16
gradient_clipping_norm = 1.0
share_training_batches = false
save_checkpoint = false

[space.data]
path = "data/sberbank-housing"
num_policy = "noisy-quantile"
bin_policy = "convert-to-cat"
cat_policy = "ordinal"
cache = true

[space.model]
type = "tabm"

[space.model.backbone]
arch_type = "tabm"
k = 16
n_blocks = [
    "_tune_",
    "int",
    1,
    5,
]
d_block = [
    "_tune_",
    "int",
    64,
    1024,
    16,
]
dropout = [
    "_tune_",
    "?uniform",
    0.0,
    0.0,
    0.5,
]

[space.optimizer]
type = "Muon"
lr = [
    "_tune_",
    "loguniform",
    0.0001,
    0.005,
]
weight_decay = [
    "_tune_",
    "loguniform",
    0.001,
    1.0,
]
betas = [
    0.9,
    0.999,
]
eps = 1e-08

[space.optimizer.muon]
lr = [
    "_tune_",
    "loguniform",
    0.001,
    0.1,
]
